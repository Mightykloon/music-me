name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: music-me

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: music-me/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npx prisma generate && npx next build
        env:
          SKIP_ENV_VALIDATION: true
          DATABASE_URL: "postgresql://placeholder/placeholder"
          NEXTAUTH_SECRET: "ci-placeholder-secret"
          NEXTAUTH_URL: "http://localhost:3000"
